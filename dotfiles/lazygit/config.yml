gui:
  theme:
    activeBorderColor:   [cyan, bold]
    inactiveBorderColor: [white]
    selectedLineBgColor: [blue]
  showFileTree:   true
  showRandomTip:  false
  nerdFontsVersion: "3"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never

keybinding:
  universal:
    quit: q
    return: <esc>
