# ── hypridle (legacy / overlap with Noctalia v4) ──────────────────────
#
# Noctalia v4 has native idle management (settings.json → "idle" block):
#   lockTimeout, screenOffTimeout, suspendTimeout, fadeDuration,
#   customCommands (JSON array of {timeout, command, resumeCommand}),
#   plus lockCommand / screenOffCommand / suspendCommand hooks.
#
# This hypridle config currently coexists with Noctalia and races it
# (hypridle DPMS-off at 600s, Noctalia screenOffTimeout default 600s →
# both fire at the same idle tick; lock fires twice; etc).
#
# Cleanup options (decide before next rebuild):
#   1. Move OLED brightness-dim tiers into Noctalia idle.customCommands
#      and remove `hl.exec_cmd("hypridle")` from autostart.lua
#   2. Keep hypridle ONLY for brightness dim (remove lock/dpms/suspend
#      listeners below) and set Noctalia's lockTimeout/screenOffTimeout
#      slightly later than hypridle's brightness ladder
#   3. Status quo (this file): both running, Noctalia wins on lock/dpms
#      due to its own lock screen; hypridle adds extra fallback safety
#
# Leaving as the original (pre-PR #8) config until that decision is made.

general {
    lock_cmd         = noctalia-shell ipc call lockScreen lock
    before_sleep_cmd = noctalia-shell ipc call lockScreen lock
    after_sleep_cmd  = hyprctl dispatch dpms on
}

listener {
    timeout  = 300
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

listener {
    timeout    = 360
    on-timeout = loginctl lock-session
}

listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
