general {
    lock_cmd         = noctalia-shell ipc call lockScreen lock
    before_sleep_cmd = noctalia-shell ipc call lockScreen lock
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# ── OLED-tuned idle ladder (Dell XPS 15 9510 OLED 3456x2160) ──────────
# Aggressive dim + early DPMS off — pixel-shift isn't reliable on
# Wayland without compositor support, so the play is: short bright time,
# fast dim, early black. Static elements (Noctalia bar) burn-in mitigated
# by the bar's own auto-hide; tune in noctalia/settings.json if needed.

# 2 min — gentle dim to 40 %
listener {
    timeout    = 120
    on-timeout = brightnessctl -s set 40%
    on-resume  = brightnessctl -r
}

# 4 min — deep dim to 10 %
listener {
    timeout    = 240
    on-timeout = brightnessctl set 10%
    on-resume  = brightnessctl -r
}

# 5 min — lock session
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 7 min — screen fully off (OLED only burns when emitting light)
listener {
    timeout    = 420
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min — suspend
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
