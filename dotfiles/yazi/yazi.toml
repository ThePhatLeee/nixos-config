[manager]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size       = 2
max_width      = 600
max_height     = 900
cache_dir      = ""
image_filter   = "triangle"
image_quality  = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'kitty $@', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', for = "linux" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$0")"', for = "linux" },
]
extract = [
  { run = 'unar "$1"', for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', for = "unix" },
  { run = 'mediainfo "$1"; echo "Press to quit"; read _', block = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*",             use = "edit"    },
  { mime = "image/*",            use = "open"    },
  { mime = "video/*",            use = "play"    },
  { mime = "audio/*",            use = "play"    },
  { mime = "application/pdf",    use = "open"    },
  { mime = "inode/x-empty",      use = "edit"    },
  { mime = "*",                  use = "open"    },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
